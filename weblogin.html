<!DOCTYPE html>
<html>
<head>

<title>Login | Web Child</title>

<style>

body{
font-family:Arial;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
overflow:hidden;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

body::before{
content:"";
position:absolute;
width:400px;
height:400px;
background:linear-gradient(45deg,#2563eb,#00f2fe);
filter:blur(150px);
opacity:0.4;
top:-100px;
left:-100px;
animation:float 8s infinite alternate;
}

@keyframes float{
from{transform:translateY(0)}
to{transform:translateY(80px)}
}

.box{
background:rgba(255,255,255,0.95);
padding:40px;
border-radius:15px;
width:320px;
text-align:center;
box-shadow:0 20px 50px rgba(0,0,0,0.4);
transition:0.4s;
}

.box:hover{
transform:translateY(-5px);
}

input{
width:100%;
padding:12px;
margin:12px 0;
border-radius:10px;
border:1px solid #ccc;
transition:0.3s;
font-size:14px;
}

input:focus{
border-color:#2563eb;
outline:none;
box-shadow:0 0 8px rgba(37,99,235,0.6);
transform:scale(1.02);
}

button{
padding:12px;
width:100%;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
border-radius:15px;
font-size:16px;
transition:0.3s;
}

button:hover{
background:#1d4ed8;
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

h2{
margin-bottom:20px;
color:#111827;
}

</style>

</head>

<body>

<div class="box">

<h2>Login / Sign Up</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">Continue</button>

</div>

<script>

function login(){

let user=document.getElementById("username").value
let pass=document.getElementById("password").value

if(user && pass){

localStorage.setItem("webchildUser",user)

window.location.href="webdashboard.html"

}else{
alert("Fill all fields")
}

}

</script>

</body>
</html>
